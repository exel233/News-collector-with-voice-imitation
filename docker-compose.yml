services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: news
      POSTGRES_USER: news
      POSTGRES_PASSWORD: news
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build:
      context: ./backend
    environment:
      SECRET_KEY: dev-secret-change-me
      DATABASE_URL: postgresql+psycopg://news:news@postgres:5432/news
      CORS_ORIGINS: '["http://localhost:3000"]'
      FRONTEND_URL: http://localhost:3000
      BACKEND_PUBLIC_URL: http://localhost:8000
      MEDIA_DIR: /app/media
      MOCK_NEWS_MODE: "true"
      ADMIN_EMAIL: admin@example.com
      ADMIN_PASSWORD: Admin123456!
      ADMIN_FULL_NAME: Local Admin
    volumes:
      - ./backend:/app
      - backend_media:/app/media
    ports:
      - "8000:8000"
    depends_on:
      - postgres

  frontend:
    build:
      context: ./frontend
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000/api
      NEXT_PUBLIC_BACKEND_ORIGIN: http://localhost:8000
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  postgres_data:
  backend_media:
